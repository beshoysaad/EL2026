name: Python

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install requests
      - name: Run python scripts
        run: |
          chmod +x run_python.sh
          ./run_python.sh

  # Aggregate check — this is the required status check on main.
  # It always reports, so PRs that only touch cpp/ still get a green "Python".
  python:
    name: Python
    if: always()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check Python matrix result
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Python pipeline failed"
            exit 1
          fi
          echo "Python pipeline passed"
